<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="2">
    <title>Información de Datos - Vista Alternativa</title>
    <style>
        #tabla-comp{
            border-collapse: collapse;
            margin-top: 20px;
        }
        #q1,#q2,#q3,#q4{
            width: 100px;
            height: 100px;
            border: 1px solid black;
            text-align: center;
            font-family: sans-serif;
            font-weight: bold;
        }
        #q1{background-color:
            {% if ejeX > 0 and ejeY > 0 %}
                lightblue;
            {% else %}
                gray;
            {% endif %}
        }
        #q2{background-color:
            {% if ejeX > 0 and ejeY < 0 %}
                lightblue;
            {% else %}
                gray;
            {% endif %}
        }
        #q3{background-color:
            {% if ejeX < 0 and ejeY > 0 %}
                lightblue;
            {% else %}
                gray;
            {% endif %}
        }
        #q4{background-color:
            {% if ejeX < 0 and ejeY < 0 %}
                lightblue;
            {% else %}
                gray;
            {% endif %}
        }
    </style>
</head>
<body style="background-color: #121212; color: white; font-family: sans-serif; padding: 20px;">

    <!-- Barra de Navegación Estática (Sin JavaScript) -->
    <div id="menu-navegacion" style="background-color: #222; padding: 15px; text-align: center; margin-bottom: 25px; border-bottom: 3px solid #ff0000;">
        <a href="/" style="color: #ffffff; margin: 0 15px; text-decoration: none; font-weight: bold;">[ Matriz Principal ]</a>
        <a href="/info" style="color: #ff0000; margin: 0 15px; text-decoration: none; font-weight: bold;">[ Vista Alternativa (jfpc) ]</a>
        <a href="/mensaje" style="color: #ffffff; margin: 0 15px; text-decoration: none; font-weight: bold;">[ Mensajes del Sistema ]</a>
    </div>

    <h1>Posición XY (Vista de compañero jfpc)</h1>
    <p>X = {{ ejeX }}</p>
    <p>Y = {{ ejeY }}</p>

    <table id="tabla-comp">
        <tr>
            <td id="q1">Q1</td>
            <td id="q2">Q2</td>
        </tr>
        <tr>
            <td id="q3">Q3</td>
            <td id="q4">Q4</td>
        </tr>
    </table>

</body>
</html>
